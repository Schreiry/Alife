<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>
    .box{fill:#f6f7fb;stroke:#1f2a44;stroke-width:1.5;rx:6;}
    .title{font:700 14px sans-serif;fill:#0d1b2a}
    .label{font:400 12px sans-serif;fill:#0d1b2a}
    .arrow{stroke:#1f2a44;stroke-width:1.6;fill:none;marker-end:url(#head)}
  </style>
  <defs>
    <marker id="head" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2a44"/>
    </marker>
  </defs>
  <!-- boxes -->
  <rect x="20" y="20" width="200" height="80" class="box"/>
  <text x="30" y="45" class="title">core</text>
  <text x="30" y="65" class="label">world, grid, simulation</text>

  <rect x="260" y="20" width="200" height="80" class="box"/>
  <text x="270" y="45" class="title">genetics</text>
  <text x="270" y="65" class="label">genes, genome, mutation</text>

  <rect x="500" y="20" width="200" height="80" class="box"/>
  <text x="510" y="45" class="title">behavior</text>
  <text x="510" y="65" class="label">perception, decisions, brain</text>

  <rect x="20" y="140" width="200" height="60" class="box"/>
  <text x="30" y="165" class="title">entities</text>
  <text x="30" y="185" class="label">creature, clan, resource</text>

  <rect x="260" y="140" width="200" height="60" class="box"/>
  <text x="270" y="165" class="title">data</text>
  <text x="270" y="185" class="label">stats, save_load, profiler</text>

  <rect x="500" y="140" width="200" height="60" class="box"/>
  <text x="510" y="165" class="title">frontend</text>
  <text x="510" y="185" class="label">observatory, renderer, ui</text>

  <!-- arrows -->
  <path d="M220,60 L260,60" class="arrow"/>
  <path d="M460,60 L500,60" class="arrow"/>
  <path d="M120,100 L120,140" class="arrow"/>
  <path d="M360,100 L360,140" class="arrow"/>
  <path d="M600,100 L600,140" class="arrow"/>
  <path d="M160,180 L260,180" class="arrow"/>
  <path d="M460,180 L500,180" class="arrow"/>

  <text x="20" y="220" class="label">High-level module map</text>
</svg>
